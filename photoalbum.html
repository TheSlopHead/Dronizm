      btn.textContent = '🔇 Включить музыку';
    } else {
      audio.play();

         <script>
    const btn = document.getElementById('music-btn');
const audio = document.getElementById('bg-music');
const trackContainer = document.getElementById('track-container');
let isPlaying = false;

audio.volume = 0.05;

btn.addEventListener('click', () => {
  if (isPlaying) {
    audio.pause();
    btn.textContent = '🔇 Включить музыку';
    trackContainer.classList.add('hidden'); // Скрываем бегущую строку
  } else {
    audio.play();
    btn.textContent = '🔊 Выключить музыку';
    trackContainer.classList.remove('hidden'); // Показываем бегущую строку
  }
  isPlaying = !isPlaying;
});
        </script>
